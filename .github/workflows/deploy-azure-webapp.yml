name: Build and deploy ASP.NET Core app to Azure Web App

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ASPCRUDAssignment.csproj

      - name: Build
        run: dotnet build ASPCRUDAssignment.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ASPCRUDAssignment.csproj --configuration Release --no-restore --output publish

      - name: Deploy to Azure Web App
        if: ${{ secrets.AZURE_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v4
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: publish
